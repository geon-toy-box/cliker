# Strict analysis for a shippable product. Treats sloppiness as an error early
# so it never reaches a paying user. Generated by toybox-project scaffold.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Generated files own these; not our concern.
    invalid_annotation_target: ignore
    # Make these refactor-smells hard errors, not soft infos.
    todo: ignore             # TODOs are tracked in planner.md, not the analyzer
    unused_import: error
    unused_local_variable: error
    dead_code: error
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.mocks.dart"

linter:
  rules:
    # Correctness
    - always_declare_return_types
    - avoid_dynamic_calls
    - avoid_empty_else
    - avoid_print            # use a logger; print() does not ship
    - cancel_subscriptions
    - close_sinks
    - throw_in_finally
    - unawaited_futures
    # Style / consistency (keeps diffs and reviews clean)
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_final_locals
    - prefer_final_in_for_each
    - require_trailing_commas
    - sort_child_properties_last
    - use_super_parameters
    - directives_ordering
